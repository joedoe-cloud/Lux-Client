name: Lux Client Build

on:
  push:
    branches:
      - main

jobs:
  build:

    name: Build Lux Client

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle


      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew


      - name: Build with Gradle
        run: ./gradlew build


      - name: Upload Lux Client JAR
        uses: actions/upload-artifact@v4
        with:
          name: lux-client-build
          path: build/libs/*.jar
